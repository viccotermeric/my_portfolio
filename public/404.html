<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal: page not found</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c1917;
        --panel: #2a2420;
        --text: #ede0cc;
        --muted: #9a8878;
        --accent: #c17b2a;
        --border: #3a3028;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      body {
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .terminal {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--panel);
        border-radius: 8px;
        padding: 1.5rem;
        box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      }

      .title {
        color: var(--accent);
        font-size: 1rem;
        margin-bottom: 1rem;
      }

      .line {
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .muted {
        color: var(--muted);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="terminal" role="main" aria-label="Page not found">
      <div class="title">bash: page: command not found</div>
      <div class="line">
        The path you asked for does not exist.<br />
        Try <a href="/">cd /</a> to return home.<br />
        <span class="muted">Terminal is still alive and well.</span>
      </div>
    </main>
  </body>
</html>
